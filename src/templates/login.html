<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Pico Bot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="text-center mb-md">
      <div style="font-size:48px">🤖</div>
      <h2 style="margin:8px 0 4px; color:#fff">Pico Bot</h2>
      <p class="text-dim text-sm">Sign in to your assistant</p>
    </div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <label>
        <span class="text-sm text-muted">Username</span>
        <input type="text" name="username" required autocomplete="username"
               placeholder="admin" class="w-full">
      </label>
      <label style="margin-top:12px; display:block">
        <span class="text-sm text-muted">Password</span>
        <input type="password" name="password" required autocomplete="current-password"
               placeholder="••••" class="w-full">
      </label>
      <button type="submit" class="btn btn-accent w-full" style="margin-top:16px; padding:10px; justify-content:center">
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-dim" style="margin-top:16px">
      No account? <a href="/register">Register</a>
    </p>
  </div>
</div>
</body>
</html>
